<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StrategyHub — Team Intelligence Platform</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f0f13;color:#e8e6f0;min-height:100vh}
:root{
  --bg0:#0f0f13;--bg1:#16161e;--bg2:#1e1e28;--bg3:#26263a;
  --accent:#7c6af7;--accent2:#a78bfa;--accent3:#c4b5fd;
  --teal:#2dd4bf;--amber:#fbbf24;--coral:#f87171;--green:#4ade80;
  --text1:#f0eeff;--text2:#b8b4d8;--text3:#7a7694;
  --border:#2e2e42;--border2:#3e3e58;
  --r:10px;--r2:14px;
}
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column}
.main{flex:1;overflow-y:auto;background:var(--bg0)}
.logo{padding:20px 18px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--teal));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-text{font-size:15px;font-weight:700;color:var(--text1);letter-spacing:-.3px}
.logo-sub{font-size:10px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase}
.nav{padding:12px 8px;flex:1;display:flex;flex-direction:column;gap:2px}
.nav-section{font-size:10px;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;padding:12px 10px 6px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;user-select:none}
.nav-item:hover{background:var(--bg3);color:var(--text1)}
.nav-item.active{background:rgba(124,106,247,.15);color:var(--accent2)}
.nav-item i{font-size:16px;width:18px;text-align:center}
.nav-badge{margin-left:auto;background:var(--bg3);color:var(--text3);font-size:10px;padding:2px 7px;border-radius:20px}
.nav-item.active .nav-badge{background:rgba(124,106,247,.2);color:var(--accent3)}
.topbar{display:flex;align-items:center;gap:12px;padding:16px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg0);z-index:10}
.page-title{font-size:18px;font-weight:700;color:var(--text1)}
.page-sub{font-size:12px;color:var(--text3);margin-top:1px}
.topbar-actions{margin-left:auto;display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#6c5ae0}
.btn-ghost{background:var(--bg2);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg3);color:var(--text1)}
.btn-sm{padding:6px 11px;font-size:12px}
.btn-danger{background:rgba(248,113,113,.15);color:var(--coral);border:1px solid rgba(248,113,113,.3)}
.btn-danger:hover{background:rgba(248,113,113,.25)}
.content{padding:20px 24px}
.filter-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}
.search-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:9px 12px 9px 36px;color:var(--text1);font-size:13px;outline:none;font-family:inherit}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{border-color:var(--accent)}
.filter-select{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:8px 12px;color:var(--text2);font-size:12px;cursor:pointer;outline:none;font-family:inherit}
.filter-select:focus{border-color:var(--accent);color:var(--text1)}
.proposals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.proposal-card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r2);padding:18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.proposal-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--teal))}
.proposal-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.card-title{font-size:14px;font-weight:600;color:var(--text1);line-height:1.4;flex:1;margin-right:8px}
.card-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.tag-cat{background:rgba(124,106,247,.15);color:var(--accent3)}
.tag-aud{background:rgba(45,212,191,.12);color:var(--teal)}
.tag-type{background:rgba(251,191,36,.12);color:var(--amber)}
.card-insight{font-size:12px;color:var(--text3);line-height:1.6;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--border)}
.card-date{font-size:11px;color:var(--text3)}
.card-author{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
.avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:22px}
.stat-card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-val{font-size:24px;font-weight:700;color:var(--text1)}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal-backdrop.open{display:flex}
.modal{background:var(--bg1);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg1);z-index:1}
.modal-title{font-size:16px;font-weight:700;color:var(--text1)}
.modal-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:22px;padding:2px;line-height:1;display:flex;align-items:center}
.modal-close:hover{color:var(--text1)}
.modal-body{padding:24px}
.form-group{margin-bottom:18px}
.form-label{display:block;font-size:12px;color:var(--text2);margin-bottom:7px;font-weight:500}
.form-input,.form-textarea,.form-select-lg{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:10px 13px;color:var(--text1);font-size:13px;outline:none;font-family:inherit;transition:border-color .15s}
.form-textarea{min-height:90px;resize:vertical;line-height:1.6}
.form-input:focus,.form-textarea:focus,.form-select-lg:focus{border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-footer{display:flex;justify-content:flex-end;gap:10px;padding-top:16px;border-top:1px solid var(--border);margin-top:8px}
.detail-section{margin-bottom:22px}
.detail-section-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.detail-body{font-size:13px;color:var(--text2);line-height:1.75}
.detail-body p{margin-bottom:10px}
.insight-block{background:rgba(124,106,247,.08);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:12px 16px;margin-bottom:10px}
.insight-block strong{color:var(--accent2);font-size:11px;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
.insight-block p{font-size:13px;color:var(--text2);margin:0;line-height:1.6}
.kb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.kb-card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r2);padding:20px;cursor:pointer;transition:all .2s}
.kb-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.kb-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.kb-card-title{font-size:14px;font-weight:600;color:var(--text1);margin-bottom:6px}
.kb-card-desc{font-size:12px;color:var(--text3);line-height:1.6}
.kb-card-meta{margin-top:14px;font-size:11px;color:var(--text3)}
.audience-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.audience-card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r2);padding:18px}
.audience-name{font-size:15px;font-weight:600;color:var(--text1);margin-bottom:4px}
.audience-sub{font-size:12px;color:var(--text3);margin-bottom:14px}
.aud-stats{display:flex;gap:20px;margin-bottom:14px}
.aud-stat-val{font-size:20px;font-weight:700;color:var(--accent2)}
.aud-stat-lab{font-size:10px;color:var(--text3);text-transform:uppercase}
.insights-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.insights-list li{font-size:12px;color:var(--text2);padding:6px 10px;background:var(--bg2);border-radius:6px;line-height:1.5}
.empty{text-align:center;padding:60px 24px;color:var(--text3)}
.empty i{font-size:48px;margin-bottom:14px;display:block;opacity:.4}
.empty p{font-size:14px;margin-bottom:16px}
.activity-row{display:flex;align-items:center;gap:16px;background:var(--bg1);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:10px}
.activity-icon{width:36px;height:36px;background:rgba(124,106,247,.1);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.onboard-step{display:flex;gap:14px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--border)}
.onboard-step:last-child{border-bottom:none}
.step-num{width:26px;height:26px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
</head>
<body>
<div class="shell">

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <div class="logo-text">StrategyHub</div>
      <div class="logo-sub">Team Intelligence</div>
    </div>
  </div>
  <div class="nav">
    <div class="nav-section">Library</div>
    <div class="nav-item active" data-page="proposals">
      <i class="ti ti-files"></i> All Proposals <span class="nav-badge" id="nb-proposals">0</span>
    </div>
    <div class="nav-item" data-page="audiences">
      <i class="ti ti-users"></i> Target Audiences
    </div>
    <div class="nav-item" data-page="activities">
      <i class="ti ti-layout-kanban"></i> Key Activities
    </div>
    <div class="nav-section">Learn</div>
    <div class="nav-item" data-page="knowledge">
      <i class="ti ti-book"></i> Knowledge Hub
    </div>
    <div class="nav-item" data-page="insights">
      <i class="ti ti-bulb"></i> Insights Library
    </div>
    <div class="nav-section">Settings</div>
    <div class="nav-item" data-page="team">
      <i class="ti ti-user-circle"></i> Team & Onboarding
    </div>
  </div>
</nav>

<!-- MAIN -->
<main class="main" id="main"></main>

</div>

<!-- MODAL: Add Proposal -->
<div class="modal-backdrop" id="modal-add">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-add-title">
    <div class="modal-header">
      <span class="modal-title" id="modal-add-title">Add New Proposal</span>
      <button class="modal-close" onclick="closeModal('modal-add')" aria-label="Close"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Proposal Title *</label>
        <input class="form-input" id="f-title" placeholder="e.g. Q3 Brand Awareness Campaign for TechCorp"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-input form-select-lg" id="f-cat">
            <option>Brand Awareness</option><option>Performance</option><option>Content Marketing</option>
            <option>Social Media</option><option>SEO / SEM</option><option>Influencer</option>
            <option>Event &amp; Activation</option><option>CRM / Loyalty</option><option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Campaign Type</label>
          <select class="form-input form-select-lg" id="f-type">
            <option>Always-On</option><option>Seasonal</option><option>Product Launch</option>
            <option>Lead Generation</option><option>Retention</option><option>Awareness Burst</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Target Audience</label>
          <select class="form-input form-select-lg" id="f-aud">
            <option>Gen Z (18-24)</option><option>Millennials (25-34)</option><option>Gen X (35-49)</option>
            <option>Boomers (50+)</option><option>Young Professionals</option><option>Parents</option>
            <option>SME / B2B</option><option>Enterprise</option><option>Students</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Client</label>
          <input class="form-input" id="f-client" placeholder="Client name"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Date</label>
          <input class="form-input" id="f-date" type="date"/>
        </div>
        <div class="form-group">
          <label class="form-label">Author</label>
          <input class="form-input" id="f-author" placeholder="Your name"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Brief Summary</label>
        <textarea class="form-textarea" id="f-summary" placeholder="What was this proposal about? Objectives, approach..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Key Activities Proposed</label>
        <textarea class="form-textarea" id="f-activities" placeholder="List main activities, channels, tactics — separate with commas or new lines"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Key Findings &amp; Learnings</label>
        <textarea class="form-textarea" id="f-insights" placeholder="Standout insights, audience observations, or lessons learned..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Outcome</label>
        <select class="form-input form-select-lg" id="f-outcome">
          <option value="">— Select —</option>
          <option>Won</option><option>Lost</option><option>Pending</option><option>Presented</option>
        </select>
      </div>
      <div class="form-footer">
        <button class="btn btn-ghost" onclick="closeModal('modal-add')">Cancel</button>
        <button class="btn btn-primary" onclick="saveProposal()"><i class="ti ti-plus"></i> Add Proposal</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: Add Knowledge -->
<div class="modal-backdrop" id="modal-kb">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-kb-title">
    <div class="modal-header">
      <span class="modal-title" id="modal-kb-title">Add to Knowledge Hub</span>
      <button class="modal-close" onclick="closeModal('modal-kb')" aria-label="Close"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Title *</label>
        <input class="form-input" id="kb-title" placeholder="e.g. Gen Z Engagement Playbook"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-input form-select-lg" id="kb-cat">
            <option>Audience Research</option><option>Strategy Framework</option><option>Channel Playbook</option>
            <option>Creative Direction</option><option>Competitor Analysis</option><option>Case Study</option>
            <option>Template</option><option>Process Guide</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Author</label>
          <input class="form-input" id="kb-author" placeholder="Your name"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Content / Notes</label>
        <textarea class="form-textarea" style="min-height:140px" id="kb-content" placeholder="Paste your framework, research, playbook, or key notes here..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Tags (comma-separated)</label>
        <input class="form-input" id="kb-tags" placeholder="e.g. gen-z, social, tiktok, engagement"/>
      </div>
      <div class="form-footer">
        <button class="btn btn-ghost" onclick="closeModal('modal-kb')">Cancel</button>
        <button class="btn btn-primary" onclick="saveKB()"><i class="ti ti-plus"></i> Save to Hub</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: Detail -->
<div class="modal-backdrop" id="modal-detail">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="detail-title">
    <div class="modal-header">
      <span class="modal-title" id="detail-title"></span>
      <button class="modal-close" onclick="closeModal('modal-detail')" aria-label="Close"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body" id="detail-body"></div>
  </div>
</div>

<script>
// ── DATA STORE ─────────────────────────────────────────────────────────
const STORAGE_KEY = 'strategyhub_v1';
let db = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null') || {
  proposals: [
    {id:1,title:'FreshBrew Q1 Social Blitz',cat:'Social Media',type:'Seasonal',audience:'Millennials (25-34)',client:'FreshBrew Coffee',date:'2025-01-12',author:'Linh T.',summary:'Full-funnel social campaign targeting urban millennial coffee drinkers during Tet season. TikTok and IG Reels to drive trial and repeat purchase.',activities:'TikTok Hashtag Challenge, IG Reels influencer seeding (micro), Facebook retargeting, Tet-themed visual identity, Community giveaways',insights:'Millennial audience highly responsive to nostalgia + modernity blend. UGC content outperformed branded content 2.3x. Micro-influencers (50k-200k) showed 4x better engagement vs mega-influencers.',outcome:'Won'},
    {id:2,title:'TechNova B2B Lead Gen',cat:'Performance',type:'Lead Generation',audience:'SME / B2B',client:'TechNova',date:'2025-02-20',author:'An N.',summary:'Integrated performance campaign to generate qualified B2B leads for SaaS platform targeting SMEs in Vietnam and SEA.',activities:'LinkedIn Lead Gen Ads, Google Search (intent keywords), Webinar series, Whitepaper gated content, Email nurture sequence',insights:'LinkedIn CPL 3x higher but lead quality significantly better. Webinar registrations converted at 18% to demo request. Long-form content (whitepapers) drove 40% of top-quality leads.',outcome:'Won'},
    {id:3,title:'GlowSkin Influencer Launch',cat:'Influencer',type:'Product Launch',audience:'Gen Z (18-24)',client:'GlowSkin Beauty',date:'2025-03-05',author:'Linh T.',summary:'KOL-led launch for new skincare line targeting Gen Z beauty consumers. Multi-platform across TikTok, Instagram, and YouTube.',activities:'Hero KOL unboxing (3 top-tier), 20 micro-KOLs seeding, TikTok Shop integration, Before/after challenge, YouTube deep-dive reviews',insights:'Gen Z requires authenticity above all — scripted content performed poorly. TikTok Shop checkout integration increased conversion 5x vs external link. Skincare routine format far outperformed single-product posts.',outcome:'Won'},
    {id:4,title:'RetailMax Loyalty CRM',cat:'CRM / Loyalty',type:'Retention',audience:'Millennials (25-34)',client:'RetailMax',date:'2025-04-10',author:'Minh H.',summary:'Reactivation and loyalty deepening campaign for dormant and active RetailMax customers via CRM and owned channels.',activities:'Personalized email flows (7-step), Push notification series, Loyalty tier redesign, Birthday vouchers, Win-back SMS sequence',insights:'Segmenting by purchase recency (RFM) improved open rate by 60%. Personalized subject lines with first name + purchase history drove 3x CTR. Birthday campaigns showed highest ROI of any CRM tactic.',outcome:'Pending'},
    {id:5,title:'EduPath Brand Awareness Push',cat:'Brand Awareness',type:'Awareness Burst',audience:'Parents',client:'EduPath',date:'2025-05-01',author:'An N.',summary:'Mass awareness push for e-learning platform among Vietnamese parents of school-age children. 8-week burst strategy.',activities:'Facebook Video Ads (thumb-stop optimized), YouTube pre-roll, Parenting KOL partnerships, Zalo community seeding, School-gate activations',insights:'Parents respond strongly to peer testimonials over brand messaging. Zalo groups showed highest engagement per impression vs all digital channels. Creative with child success story angle beat feature-focused ads 4x.',outcome:'Lost'},
  ],
  knowledge: [
    {id:1,title:'Gen Z Digital Behavior Report 2025',cat:'Audience Research',author:'Linh T.',date:'2025-03-01',content:'Comprehensive breakdown of Gen Z media habits in Vietnam. Key findings: 78% discover brands on TikTok first, 92% trust peer reviews over ads, average attention span on feed is 1.7s. Authenticity is the #1 brand quality they value. Short-form video is the dominant format for product discovery.',tags:['gen-z','tiktok','vietnam','research']},
    {id:2,title:'TikTok Creative Framework',cat:'Channel Playbook',author:'An N.',date:'2025-02-14',content:'Step-by-step guide for TikTok content strategy. Hook in first 1.5s, pattern interrupt, native feel, trending audio, strong CTA at 85% of video. Includes templates for product reveal, tutorial, UGC amplification, and challenge formats. Always shoot vertically and use captions.',tags:['tiktok','creative','framework','social']},
    {id:3,title:'B2B LinkedIn Strategy Playbook',cat:'Channel Playbook',author:'Minh H.',date:'2025-01-20',content:'Proven LinkedIn approach for B2B marketing in SEA. Includes audience targeting matrix, ad format decision tree, content calendar template, and lead nurture sequence. Focus on thought leadership + direct response hybrid. Lead Gen Forms outperform landing page redirects by 2x.',tags:['linkedin','b2b','lead-gen','sea']},

function persist(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }

// ── STATE ──────────────────────────────────────────────────────────────
let currentPage = 'proposals';
let searchQ = '', filterCat = 'All', filterAud = 'All', filterType = 'All';

// ── NAV ────────────────────────────────────────────────────────────────
document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    currentPage = el.dataset.page;
    searchQ = ''; filterCat = 'All'; filterAud = 'All'; filterType = 'All';
    render();
  });
});

// ── RENDER ROUTER ──────────────────────────────────────────────────────
function render(){
  const main = document.getElementById('main');
  if(currentPage === 'proposals')  main.innerHTML = pageProposals();
  else if(currentPage === 'audiences') main.innerHTML = pageAudiences();
  else if(currentPage === 'activities') main.innerHTML = pageActivities();
  else if(currentPage === 'knowledge') main.innerHTML = pageKnowledge();
  else if(currentPage === 'insights') main.innerHTML = pageInsights();
  else if(currentPage === 'team') main.innerHTML = pageTeam();
  document.getElementById('nb-proposals').textContent = db.proposals.length;
  bindPageEvents();
}

// ── PROPOSALS PAGE ──────────────────────────────────────────────────────
function pageProposals(){
  const cats  = ['All', ...new Set(db.proposals.map(p => p.cat))];
  const auds  = ['All', ...new Set(db.proposals.map(p => p.audience))];
  const types = ['All', ...new Set(db.proposals.map(p => p.type))];
  const list  = db.proposals.filter(p => {
    const q = searchQ.toLowerCase();
    return (filterCat==='All'||p.cat===filterCat) &&
           (filterAud==='All'||p.audience===filterAud) &&
           (filterType==='All'||p.type===filterType) &&
           (!q || [p.title,p.client,p.summary,p.insights,p.activities].join(' ').toLowerCase().includes(q));
  });
  const won = db.proposals.filter(p=>p.outcome==='Won').length;
  const total = db.proposals.length;

  return `
  <div class="topbar">
    <div><div class="page-title">Proposal Library</div><div class="page-sub">${total} proposals · ${won} won</div></div>
    <div class="topbar-actions">
      <button class="btn btn-primary" onclick="openModal('modal-add')"><i class="ti ti-plus"></i> Add Proposal</button>
    </div>
  </div>
  <div class="content">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Total</div><div class="stat-val">${total}</div></div>
      <div class="stat-card"><div class="stat-label">Won</div><div class="stat-val" style="color:var(--green)">${won}</div></div>
      <div class="stat-card"><div class="stat-label">Win Rate</div><div class="stat-val">${total?Math.round(won/total*100):0}%</div></div>
      <div class="stat-card"><div class="stat-label">Categories</div><div class="stat-val">${new Set(db.proposals.map(p=>p.cat)).size}</div></div>
      <div class="stat-card"><div class="stat-label">Clients</div><div class="stat-val">${new Set(db.proposals.map(p=>p.client)).size}</div></div>
    </div>
    <div class="filter-bar">
      <div class="search-wrap">
        <i class="ti ti-search"></i>
        <input class="search-input" id="search-input" placeholder="Search proposals, clients, insights..." value="${escHtml(searchQ)}"/>
      </div>
      <select class="filter-select" id="sel-cat">${cats.map(c=>`<option${c===filterCat?' selected':''}>${c}</option>`).join('')}</select>
      <select class="filter-select" id="sel-aud">${auds.map(a=>`<option${a===filterAud?' selected':''}>${a}</option>`).join('')}</select>
      <select class="filter-select" id="sel-type">${types.map(t=>`<option${t===filterType?' selected':''}>${t}</option>`).join('')}</select>
    </div>
    ${list.length === 0
      ? `<div class="empty"><i class="ti ti-file-off"></i><p>No proposals match your filters.</p><button class="btn btn-ghost btn-sm" onclick="filterCat='All';filterAud='All';filterType='All';searchQ='';render()">Clear filters</button></div>`
      : `<div class="proposals-grid">${list.map(proposalCard).join('')}</div>`
    }
  </div>`;
}

function proposalCard(p){
  const outcomeColor = {Won:'var(--green)',Lost:'var(--coral)',Pending:'var(--amber)',Presented:'var(--teal)'}[p.outcome]||'var(--text3)';
  const initials = p.author.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();
  return `
  <div class="proposal-card" onclick="openDetailProposal(${p.id})">
    <div class="card-header">
      <div class="card-title">${escHtml(p.title)}</div>
      ${p.outcome?`<span style="font-size:10px;font-weight:600;color:${outcomeColor};white-space:nowrap;background:rgba(255,255,255,.05);padding:3px 8px;border-radius:20px">${p.outcome}</span>`:''}
    </div>
    <div class="card-meta">
      <span class="tag tag-cat">${escHtml(p.cat)}</span>
      <span class="tag tag-aud"><i class="ti ti-users" style="font-size:10px"></i> ${escHtml(p.audience)}</span>
      <span class="tag tag-type">${escHtml(p.type)}</span>
    </div>
    <div class="card-insight">${escHtml(p.insights||p.summary)}</div>
    <div class="card-footer">
      <span class="card-date"><i class="ti ti-calendar" style="font-size:11px;vertical-align:-1px"></i> ${p.date} · ${escHtml(p.client)}</span>
      <span class="card-author"><div class="avatar" style="background:rgba(124,106,247,.2);color:var(--accent2)">${initials}</div>${escHtml(p.author)}</span>
    </div>
  </div>`;
}

function openDetailProposal(id){
  const p = db.proposals.find(x=>x.id===id);
  if(!p) return;
  document.getElementById('detail-title').textContent = p.title;
  const outcomeColor = {Won:'var(--green)',Lost:'var(--coral)',Pending:'var(--amber)',Presented:'var(--teal)'}[p.outcome]||'var(--text3)';
  document.getElementById('detail-body').innerHTML = `
    <div class="detail-section">
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <span class="tag tag-cat">${escHtml(p.cat)}</span>
        <span class="tag tag-aud">${escHtml(p.audience)}</span>
        <span class="tag tag-type">${escHtml(p.type)}</span>
        ${p.outcome?`<span class="tag" style="background:rgba(255,255,255,.05);color:${outcomeColor}">${p.outcome}</span>`:''}
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Client &amp; Team</div>
      <div class="detail-body"><p><strong style="color:var(--text1)">${escHtml(p.client)}</strong> &nbsp;·&nbsp; ${p.date} &nbsp;·&nbsp; ${escHtml(p.author)}</p></div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Summary</div>
      <div class="detail-body"><p>${escHtml(p.summary)}</p></div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Key Activities</div>
      <div>
        ${p.activities.split(/[,\n]/).filter(a=>a.trim().length>2).map(a=>`
        <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:8px">
          <i class="ti ti-circle-check" style="color:var(--teal);font-size:15px;margin-top:1px;flex-shrink:0"></i>
          <span style="font-size:13px;color:var(--text2)">${escHtml(a.trim())}</span>
        </div>`).join('')}
      </div>
    </div>
    ${p.insights?`<div class="detail-section">
      <div class="detail-section-title">Key Findings &amp; Learnings</div>
      ${p.insights.split(/\.\s+/).filter(s=>s.length>10).map(s=>`
      <div class="insight-block">
        <strong>Insight</strong>
        <p>${escHtml(s.trim())}${s.trim().endsWith('.')?'':'.'}</p>
      </div>`).join('')}
    </div>`:''}
    <div style="display:flex;gap:10px;padding-top:16px;border-top:1px solid var(--border)">
      <button class="btn btn-danger btn-sm" onclick="deleteProposal(${p.id})"><i class="ti ti-trash"></i> Delete</button>
    </div>`;
  openModal('modal-detail');
}

function deleteProposal(id){
  if(!confirm('Delete this proposal? This cannot be undone.')) return;
  db.proposals = db.proposals.filter(p=>p.id!==id);
  persist(); closeModal('modal-detail'); render();
}

// ── AUDIENCES ──────────────────────────────────────────────────────────
function pageAudiences(){
  const map = {};
  db.proposals.forEach(p=>{
    if(!map[p.audience]) map[p.audience]={name:p.audience,proposals:[],insights:[]};
    map[p.audience].proposals.push(p);
    if(p.insights) map[p.audience].insights.push(...p.insights.split(/\.\s+/).filter(s=>s.length>15));
  });
  const list = Object.values(map).sort((a,b)=>b.proposals.length-a.proposals.length);
  return `
  <div class="topbar"><div><div class="page-title">Target Audiences</div><div class="page-sub">Aggregated learnings by audience segment</div></div></div>
  <div class="content">
    ${list.length===0?`<div class="empty"><i class="ti ti-users-group"></i><p>No audience data yet. Add proposals to see segments.</p></div>`:`
    <div class="audience-grid">
      ${list.map(a=>{
        const won = a.proposals.filter(p=>p.outcome==='Won').length;
        const uniqueInsights = [...new Set(a.insights)].slice(0,5);
        return `
        <div class="audience-card">
          <div class="audience-name">${escHtml(a.name)}</div>
          <div class="audience-sub">${a.proposals.length} proposal${a.proposals.length!==1?'s':''}</div>
          <div class="aud-stats">
            <div><div class="aud-stat-val">${a.proposals.length}</div><div class="aud-stat-lab">Proposals</div></div>
            <div><div class="aud-stat-val" style="color:var(--green)">${won}</div><div class="aud-stat-lab">Won</div></div>
            <div><div class="aud-stat-val">${a.proposals.length?Math.round(won/a.proposals.length*100):0}%</div><div class="aud-stat-lab">Win Rate</div></div>
          </div>
          <div class="detail-section-title" style="margin-bottom:8px">Key Learnings</div>
          <ul class="insights-list">
            ${uniqueInsights.length?uniqueInsights.map(i=>`<li>${escHtml(i.trim())}${i.trim().endsWith('.')?'':'.'}</li>`).join(''):'<li style="color:var(--text3)">No insights captured yet.</li>'}
          </ul>
        </div>`;
      }).join('')}
    </div>`}
  </div>`;
}

// ── ACTIVITIES ──────────────────────────────────────────────────────────
function pageActivities(){
  const map = {};
  db.proposals.forEach(p=>{
    p.activities.split(/[,\n]/).forEach(a=>{
      const k = a.trim();
      if(!k||k.length<3) return;
      if(!map[k]) map[k]={name:k,count:0,proposals:[]};
      map[k].count++;
      map[k].proposals.push(p.title);
    });
  });
  const list = Object.values(map).sort((a,b)=>b.count-a.count);
  return `
  <div class="topbar"><div><div class="page-title">Key Activities</div><div class="page-sub">All tactics and activities ever proposed, ranked by frequency</div></div></div>
  <div class="content">
    ${list.length===0?`<div class="empty"><i class="ti ti-layout-kanban"></i><p>No activities yet. Add proposals with activities.</p></div>`:`
    <div>
      ${list.map(a=>`
      <div class="activity-row">
        <div class="activity-icon">
          <i class="ti ti-check" style="color:var(--accent2);font-size:16px"></i>
        </div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:500;color:var(--text1);margin-bottom:3px">${escHtml(a.name)}</div>
          <div style="font-size:11px;color:var(--text3)">Used in: ${a.proposals.map(escHtml).join(' · ')}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:20px;font-weight:700;color:var(--accent2)">${a.count}×</div>
          <div style="font-size:10px;color:var(--text3)">proposals</div>
        </div>
      </div>`).join('')}
    </div>`}
  </div>`;
}

function deleteKB(id){

// ── INSIGHTS PAGE ──────────────────────────────────────────────────────
function pageInsights(){

  db.proposals.forEach(p=>{
    (p.insights||'').split(/\.\s+/).filter(s=>s.length>15).forEach(s=>{
      all.push({text:s.trim(),proposal:p.title,audience:p.audience,cat:p.cat,date:p.date,outcome:p.outcome});
    });

  return `
  <div class="topbar"><div><div class="page-title">Insights Library</div><div class="page-sub">All key learnings distilled from every proposal</div></div></div>

    ${all.length===0?`<div class="empty"><i class="ti ti-bulb"></i><p>No insights yet. Add proposals with findings.</p></div>`:`
    <div style="display:flex;flex-direction:column;gap:12px">
      ${all.map(i=>`
      <div class="insight-block" style="border-left-color:var(--teal)">

        <p>${escHtml(i.text)}${i.text.endsWith('.')?'':'.'}</p>

        const initials = a.name.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();

          <div style="font-size:12px;color:var(--text3);line-height:1.6">${d}</div>
        </div>

// ── MODAL ──────────────────────────────────────────────────────────────
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-backdrop').forEach(el=>{
  el.addEventListener('click', e=>{ if(e.target===el) el.classList.remove('open'); });

// ── SAVE PROPOSAL ──────────────────────────────────────────────────────
function saveProposal(){
  const title = document.getElementById('f-title').value.trim();
  if(!title){ alert('Please enter a proposal title.'); return; }
  const p = {
    id: Date.now(),
    title,
    cat:      document.getElementById('f-cat').value,
    type:     document.getElementById('f-type').value,
    audience: document.getElementById('f-aud').value,
    client:   document.getElementById('f-client').value.trim() || 'Unknown Client',
    date:     document.getElementById('f-date').value || new Date().toISOString().slice(0,10),
    author:   document.getElementById('f-author').value.trim() || 'Team',
    summary:  document.getElementById('f-summary').value.trim(),
    activities: document.getElementById('f-activities').value.trim(),
    insights: document.getElementById('f-insights').value.trim(),
    outcome:  document.getElementById('f-outcome').value,
  };
  db.proposals.unshift(p);
  persist();
  closeModal('modal-add');
  ['f-title','f-client','f-date','f-author','f-summary','f-activities','f-insights'].forEach(id=>{ document.getElementById(id).value=''; });
  document.getElementById('f-outcome').value = '';
  render();
}

// ── SAVE KNOWLEDGE ──────────────────────────────────────────────────────
function saveKB(){
  const title = document.getElementById('kb-title').value.trim();
  if(!title){ alert('Please enter a title.'); return; }
  const k = {
    id: Date.now(),
    title,
    cat:     document.getElementById('kb-cat').value,
    author:  document.getElementById('kb-author').value.trim() || 'Team',
    date:    new Date().toISOString().slice(0,10),
    content: document.getElementById('kb-content').value.trim(),
    tags:    document.getElementById('kb-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
  };
  db.knowledge.unshift(k);
  persist();
  closeModal('modal-kb');
  ['kb-title','kb-author','kb-content','kb-tags'].forEach(id=>{ document.getElementById(id).value=''; });
  render();
}

// ── PAGE EVENT BINDING ──────────────────────────────────────────────────
function bindPageEvents(){
  const si = document.getElementById('search-input');
  if(si) si.addEventListener('input', e=>{ searchQ = e.target.value; render(); });
  const sc = document.getElementById('sel-cat');
  if(sc) sc.addEventListener('change', e=>{ filterCat = e.target.value; render(); });
  const sa = document.getElementById('sel-aud');
  if(sa) sa.addEventListener('change', e=>{ filterAud = e.target.value; render(); });
  const st = document.getElementById('sel-type');
  if(st) st.addEventListener('change', e=>{ filterType = e.target.value; render(); });
}

// ── UTIL ────────────────────────────────────────────────────────────────
function escHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
